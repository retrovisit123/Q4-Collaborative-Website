<head>
  <meta charset="UTF-8">

  <title>Contact Us | Green Star Pros</title>
  <link rel="stylesheet" href="scripts/menu.css">
  <link rel="stylesheet" href="scripts/style.css">
</head>

<body>

  <!-- Header -->
<header class="navbar-container">
        <nav class="navbar">
            
            <div class="navbar-brand">
                <a href="index.html"><img id="logo" src="img/logo.png"></a> 
                </div>

            <input type="checkbox" id="menu-toggle">
            
            <label for="menu-toggle" class="hamburger">
                <span class="bar"></span>
                <span class="bar"></span>
                <span class="bar"></span>
            </label>

            <ul class="nav-links">
                <li><a href="index.html">Home</a></li>
                
                <li class="dropdown" id="services-dropdown">
                    <a href="services.html">Services</a>
                    <ul class="submenu">
                        <li><a href="aeration.html">Aeration</a></li>
                        <li><a href="landscape_maintnace.html">Landscape Maintenance</a></li>
                        <li><a href="treatments.html">Treatments</a></li>
                    </ul>
                </li>
                
                <li><a href="#team">Team</a></li>
                <li><a href="#blog">Blog</a></li>
                <li><a href="contact.html">Contact Us</a></li>
            </ul>
        </nav>
    </header>


  <!-- Contact Section -->
  <section class="contact-container">

    <!-- Form -->
    <div class="contact-form">
      <form onsubmit="handleSubmit(event)">
        <section class="hero">
            <h1>Contact Us</h1>
            <p>We’re here to help with your lawn care needs</p>
        </section>
        <label>Name</label>
        <input type="text" required>

        <label>Email</label>
        <input type="email" required>

        <label>Phone</label>
        <input type="tel">

        <label>Message</label>
        <textarea rows="5"></textarea>

        <div class="checkbox">
            <label>
                <input type="checkbox" required>
                I agree to the terms & privacy policy
            </label>
        </div>
        <button type="submit">Send Message</button>
      <p id="success-msg"></p>
    </div>

  </section>

  <!-- Footer -->
  <footer class="navbar-container2">
        <nav class="navbar">
            <ul class="nav-links2">
                <li><a href="index.html">1234 WashMyPants Rd. Detroit, MI 48201</a></li>
                <li><a href="index.html">Phone: (1234)-123-4567</a></li>
            </ul>   
        </nav>
    </footer>

  <script>
    function handleSubmit(e) {
      e.preventDefault();
      document.getElementById("success-msg").innerText =
        "✅ Message sent successfully!";
    }
  </script>

</body>
</html>
